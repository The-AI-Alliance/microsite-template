name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".common.mk"
      - ".console-colors.mk"
      - ".website.mk"
      - "pyproject.toml"
      - "Makefile"
      - "src/**"

jobs:
  quality:
    name: Format · Lint · Type-check · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check contrib target failures
        run: |
          if make contrib-ls; then
            echo "make contrib-ls should fail"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache uv download cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Cache virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Create virtual environment (if cache miss)
        run: |
          if [ ! -d .venv ]; then
            uv venv
          fi

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run before-pr checks
        run: make before-pr
